<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Ghost Protocol</title>
<style>
:root{--bg:#050508;--surface:#0d0d14;--s2:#111120;--border:#1a1a2e;--accent:#00ff9d;--a2:#7b2fff;--a3:#ff2d78;--text:#e0e0f0;--muted:#6b6b8a;--glow:0 0 20px rgba(0,255,157,.35);--glow2:0 0 20px rgba(123,47,255,.35);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,157,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,.03) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);}
.box{max-width:460px;width:100%;border:1px solid var(--border);background:var(--surface);position:relative;z-index:1;}
.box-header{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border);}
.logo{font-size:.85rem;font-weight:900;letter-spacing:.2em;color:var(--accent);text-shadow:var(--glow);margin-bottom:1rem;}
.logo span{color:var(--muted);font-weight:400;}
.box-header h1{font-size:1.35rem;font-weight:800;margin-bottom:.3rem;}
.box-header p{font-size:.75rem;color:var(--muted);line-height:1.6;}
.box-body{padding:1.75rem 2rem;}
.role-picker{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.role-btn{padding:1.1rem .75rem;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;}
.role-btn .icon{font-size:1.4rem;display:block;margin-bottom:.4rem;}
.role-btn:hover{border-color:var(--accent);color:var(--accent);}
.role-btn.sel-player{border-color:var(--accent);color:var(--accent);background:rgba(0,255,157,.05);}
.role-btn.sel-staff{border-color:var(--a2);color:var(--a2);background:rgba(123,47,255,.05);}
.step{display:none;}.step.active{display:block;}
.step-back{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.7rem;letter-spacing:.1em;cursor:pointer;margin-bottom:1.25rem;padding:0;display:flex;align-items:center;gap:.4rem;transition:color .15s;}
.step-back:hover{color:var(--accent);}
.tab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab-pill{flex:1;padding:.6rem;background:none;border:none;font-family:inherit;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab-pill.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-pill.active-reg{color:var(--a2);border-bottom-color:var(--a2);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.step-label{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;margin-bottom:1.1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.green{color:var(--accent);}.purple{color:var(--a2);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.62rem;letter-spacing:.15em;color:var(--muted);margin-bottom:.35rem;text-transform:uppercase;}
.form-group input,.form-group select{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.65rem .8rem;font-family:inherit;font-size:.8rem;outline:none;transition:border-color .15s;}
.form-group input:focus{border-color:var(--accent);}
.form-group input::placeholder{color:var(--muted);}
.player-types{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem;}
.ptype-btn{padding:.7rem .4rem;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;}
.ptype-btn:hover{border-color:var(--accent);color:var(--accent);}
.ptype-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,157,.06);}
.ptype-btn .price{display:block;font-size:.7rem;color:var(--accent);margin-top:.2rem;font-weight:700;}
.lock-icon{text-align:center;font-size:2.5rem;margin-bottom:1rem;}
.lock-hint{font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:1.25rem;line-height:1.6;}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0;}
.btn{width:100%;padding:.75rem;font-family:inherit;font-size:.82rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;margin-top:.25rem;}
.btn-green{background:var(--accent);color:var(--bg);box-shadow:var(--glow);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 0 35px rgba(0,255,157,.5);}
.btn-purple{background:var(--a2);color:#fff;box-shadow:var(--glow2);}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 0 35px rgba(123,47,255,.5);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-msg{font-size:.72rem;color:var(--a3);margin-top:.75rem;display:none;text-align:center;}
.error-msg.show{display:block;}
.success-msg{font-size:.72rem;color:var(--accent);margin-top:.75rem;display:none;text-align:center;}
.success-msg.show{display:block;}
.box-footer{padding:1rem 2rem;border-top:1px solid var(--border);font-size:.68rem;color:var(--muted);text-align:center;}
.box-footer a{color:var(--accent);text-decoration:none;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>
<div class="box">
  <div class="box-header">
    <div class="logo">GHOST<span>://</span>PROTOCOL</div>
    <h1>Access Terminal</h1>
    <p>Identify yourself to enter the system.</p>
  </div>
  <div class="box-body">
    <div class="step active" id="step-1">
      <div class="role-picker">
        <button class="role-btn" id="btn-player" onclick="selectRole('player')"><span class="icon">👾</span>Player</button>
        <button class="role-btn" id="btn-staff"  onclick="selectRole('staff')"><span class="icon">🛡️</span>Staff</button>
      </div>
    </div>

    <div class="step" id="step-player">
      <button class="step-back" onclick="goBack()">← Back</button>
      <div class="tab-row">
        <button class="tab-pill active"  id="tab-login"    onclick="switchTab('login')">Login</button>
        <button class="tab-pill"         id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div class="tab-panel active" id="panel-login">
        <div class="step-label green">// Player Login</div>
        <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"/></div>
        <div class="form-group"><label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" placeholder="••••••••"/>
            <button type="button" class="pw-toggle" onclick="togglePw('login-password',this)">show</button>
          </div></div>
        <button class="btn btn-green" id="btn-login" onclick="playerLogin()">Enter System</button>
        <div class="error-msg" id="login-error"></div>
      </div>

      <div class="tab-panel" id="panel-register">
        <div class="step-label purple">// Create Account</div>
        <div class="form-group"><label>Full Name / Handle</label><input type="text" id="reg-name" placeholder="e.g. Cipher_X"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"/></div>
        <div class="form-group"><label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password" placeholder="Min. 8 characters"/>
            <button type="button" class="pw-toggle" onclick="togglePw('reg-password',this)">show</button>
          </div></div>
        <div class="form-group"><label>Player Type</label>
          <div class="player-types">
            <button class="ptype-btn active" id="pt-lone"   onclick="selectType('lone')">Lone Player<span class="price">₦100</span></button>
            <button class="ptype-btn"        id="pt-team4"  onclick="selectType('team_4')">Team of 4<span class="price">₦10,000</span></button>
            <button class="ptype-btn"        id="pt-team10" onclick="selectType('team_10')">Team of 10<span class="price">₦20,000</span></button>
          </div></div>
        <div class="form-group" id="team-name-wrap" style="display:none">
          <label>Team Name</label><input type="text" id="reg-team-name" placeholder="e.g. Null Collective"/></div>
        <button class="btn btn-purple" id="btn-register" onclick="playerRegister()">Create Account</button>
        <div class="error-msg" id="reg-error"></div>
        <div class="success-msg" id="reg-success"></div>
      </div>
    </div>

    <div class="step" id="step-staff">
      <button class="step-back" onclick="goBack()">← Back</button>
      <div class="lock-icon">🔐</div>
      <div class="step-label purple" style="text-align:center">// Staff Access — FLINN Software Labs</div>
      <p class="lock-hint">Enter the admin passphrase to access the control console.</p>
      <div class="form-group"><label>Admin Passphrase</label>
        <div class="pw-wrap">
          <input type="password" id="staff-password" placeholder="••••••••••••"/>
          <button type="button" class="pw-toggle" onclick="togglePw('staff-password',this)">show</button>
        </div></div>
      <button class="btn btn-purple" id="staff-btn" onclick="staffLogin()">Enter Admin Console</button>
      <div class="error-msg" id="staff-error"></div>
    </div>
  </div>
  <div class="box-footer"><a href="index.html">← Back to Ghost Protocol</a></div>
</div>

<script>
const GhostAuth = (() => {
  const ROUTES = { lone:'lone.html', team_4:'team4.html', team_10:'team10.html', admin:'admin.html' };
  function getToken() { return localStorage.getItem('ghost_token') || sessionStorage.getItem('ghost_token'); }
  function getSession() { try { const s = localStorage.getItem('ghost_user') || sessionStorage.getItem('ghost_user'); return JSON.parse(s); } catch { return null; } }
  function setSession(token, user) {
    if (user.role === 'admin') { localStorage.setItem('ghost_token', token); localStorage.setItem('ghost_user', JSON.stringify(user)); }
    else { sessionStorage.setItem('ghost_token', token); sessionStorage.setItem('ghost_user', JSON.stringify(user)); }
  }
  function gate(requiredRole) {
    const token = getToken(); const user = getSession();
    if (!token || !user) { window.location.href = 'login.html'; return null; }
    if (user.role === 'admin') return user;
    if (!user.payment_status) { window.location.href = 'pending-payment.html'; return null; }
    if (requiredRole && requiredRole !== 'any' && user.role !== requiredRole) { window.location.href = ROUTES[user.role] || 'login.html'; return null; }
    return user;
  }
  async function api(url, options = {}) {
    const token = getToken();
    const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(options.headers || {}) } });
    if (res.status === 401) { logout(); return null; }
    return res;
  }
  function logout() { localStorage.removeItem('ghost_token'); localStorage.removeItem('ghost_user'); sessionStorage.removeItem('ghost_token'); sessionStorage.removeItem('ghost_user'); window.location.href = 'login.html'; }
  return { gate, getSession, getToken, setSession, logout, api };
})();
</script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  const PRICES = { lone: 10000, team_4: 1000000, team_10: 2000000 }; // kobo (lone = ₦100 for testing)
  let selectedType = 'lone';
  let staffAttempts = 0;
  let _pendingUser = null; // holds user data while Paystack is open

  function selectRole(r) {
    document.getElementById('step-1').classList.remove('active');
    if (r === 'player') {
      document.getElementById('btn-player').classList.add('sel-player');
      document.getElementById('step-player').classList.add('active');
    } else {
      document.getElementById('btn-staff').classList.add('sel-staff');
      document.getElementById('step-staff').classList.add('active');
      setTimeout(() => document.getElementById('staff-password').focus(), 100);
    }
  }

  function goBack() {
    ['step-player','step-staff'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('step-1').classList.add('active');
    ['login-error','reg-error','reg-success','staff-error'].forEach(id => document.getElementById(id).classList.remove('show'));
    staffAttempts = 0;
  }

  function switchTab(tab) {
    ['panel-login','panel-register'].forEach(id => document.getElementById(id).classList.remove('active'));
    ['tab-login','tab-register'].forEach(id => document.getElementById(id).classList.remove('active','active-reg'));
    if (tab === 'login') {
      document.getElementById('panel-login').classList.add('active');
      document.getElementById('tab-login').classList.add('active');
    } else {
      document.getElementById('panel-register').classList.add('active');
      document.getElementById('tab-register').classList.add('active-reg');
    }
  }

  function selectType(type) {
    selectedType = type;
    document.querySelectorAll('.ptype-btn').forEach(b => b.classList.remove('active'));
    document.getElementById({lone:'pt-lone',team_4:'pt-team4',team_10:'pt-team10'}[type]).classList.add('active');
    document.getElementById('team-name-wrap').style.display = (type !== 'lone') ? 'block' : 'none';
  }

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'show' : 'hide';
  }

  function openPaystack(user, token) {
    const ref = 'GHOST_' + Date.now();
    const handler = PaystackPop.setup({
      key: 'pk_live_a0122e8eaf5af78c67ee9fa1de121d615e30bb62',
      email: user.email,
      amount: PRICES[user.role] || 250000,
      currency: 'NGN',
      ref,
      metadata: { user_id: user.id, plan: user.role },
      callback: async function(response) {
        // Save session immediately so webhook has time to process
        GhostAuth.setSession(token, user);
        // Poll for payment confirmation (webhook may take a few seconds)
        let attempts = 0;
        const poll = setInterval(async () => {
          attempts++;
          try {
            const r = await fetch('/api-payment-status', { headers: { Authorization: `Bearer ${token}` } });
            const d = await r.json();
            if (d.payment_status) {
              clearInterval(poll);
              const updated = { ...user, payment_status: true };
              sessionStorage.setItem('ghost_user', JSON.stringify(updated));
              const routes = { lone:'lone.html', team_4:'team4.html', team_10:'team10.html' };
              window.location.href = routes[user.role] || 'lone.html';
            }
          } catch {}
          if (attempts >= 10) {
            clearInterval(poll);
            // Redirect to pending page as fallback
            window.location.href = 'pending-payment.html';
          }
        }, 2000);
      },
      onClose: function() {
        // Payment window closed without completing — go to pending
        GhostAuth.setSession(token, user);
        window.location.href = 'pending-payment.html';
      }
    });
    handler.openIframe();
  }

  async function playerLogin() {
    const email    = document.getElementById('login-email').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');
    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Authenticating...';
    try {
      const res  = await fetch('/api-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
      GhostAuth.setSession(data.token, data.user);
      if (!data.user.payment_status) { window.location.href = 'pending-payment.html'; return; }
      const routes = { lone:'lone.html', team_4:'team4.html', team_10:'team10.html' };
      window.location.href = routes[data.user.role] || 'lone.html';
    } catch(err) { errEl.textContent = 'Error: ' + err.message; errEl.classList.add('show'); }
    finally { btn.disabled = false; btn.textContent = 'Enter System'; }
  }

  async function playerRegister() {
    const name      = document.getElementById('reg-name').value.trim();
    const email     = document.getElementById('reg-email').value.trim().toLowerCase();
    const password  = document.getElementById('reg-password').value;
    const team_name = document.getElementById('reg-team-name').value.trim();
    const errEl     = document.getElementById('reg-error');
    const okEl      = document.getElementById('reg-success');
    const btn       = document.getElementById('btn-register');
    errEl.classList.remove('show'); okEl.classList.remove('show');
    if (!name || !email || !password) { errEl.textContent = 'All fields are required.'; errEl.classList.add('show'); return; }
    if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res  = await fetch('/api-register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,email,password,role:selectedType,team_name}) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
      okEl.textContent = 'Account created! Opening payment...';
      okEl.classList.add('show');
      btn.textContent = 'Awaiting payment...';
      // Fire Paystack immediately
      openPaystack(data.user, data.token);
    } catch(err) { errEl.textContent = 'Error: ' + err.message; errEl.classList.add('show'); btn.disabled = false; btn.textContent = 'Create Account'; }
  }

  async function staffLogin() {
    const input = document.getElementById('staff-password').value;
    const errEl = document.getElementById('staff-error');
    const btn   = document.getElementById('staff-btn');
    errEl.classList.remove('show');
    if (!input) { errEl.textContent = 'Enter the admin passphrase.'; errEl.classList.add('show'); return; }
    if (staffAttempts >= 5) { errEl.textContent = 'Too many attempts. Refresh to try again.'; errEl.classList.add('show'); btn.disabled = true; return; }
    btn.disabled = true; btn.textContent = 'Verifying...';
    try {
      const res  = await fetch('/api-login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email:'admin@flinn.dev', password: input }) });
      const data = await res.json();
      if (!res.ok || data.user?.role !== 'admin') {
        staffAttempts++;
        const left = 5 - staffAttempts;
        errEl.textContent = `Incorrect passphrase. ${left > 0 ? left + ' attempt' + (left>1?'s':'') + ' remaining.' : 'Locked.'}`;
        errEl.classList.add('show');
        const pw = document.getElementById('staff-password');
        pw.classList.add('shake'); pw.value = '';
        setTimeout(() => pw.classList.remove('shake'), 400);
        if (staffAttempts >= 5) btn.disabled = true;
        return;
      }
      GhostAuth.setSession(data.token, data.user);
      window.location.href = 'admin.html';
    } catch(err) { errEl.textContent = 'Error: ' + err.message; errEl.classList.add('show'); }
    finally { btn.disabled = false; btn.textContent = 'Enter Admin Console'; }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').classList.contains('active') && document.getElementById('step-player').classList.contains('active')) playerLogin();
    if (document.getElementById('panel-register').classList.contains('active') && document.getElementById('step-player').classList.contains('active')) playerRegister();
    if (document.getElementById('step-staff').classList.contains('active')) staffLogin();
  });
</script>
</body>
</html>
