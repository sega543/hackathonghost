<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pending Payment — Ghost Protocol</title>
<style>
:root{--bg:#050508;--surface:#0d0d14;--border:#1a1a2e;--accent:#00ff9d;--a3:#ff2d78;--text:#e0e0f0;--muted:#6b6b8a;--glow:0 0 20px rgba(0,255,157,.35);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.box{max-width:480px;width:100%;border:1px solid var(--border);padding:2.5rem;background:var(--surface);text-align:center;}
.icon{font-size:3rem;margin-bottom:1rem;}
.tag{font-size:.62rem;letter-spacing:.3em;color:var(--a3);text-transform:uppercase;margin-bottom:.75rem;}
h1{font-size:1.6rem;font-weight:800;margin-bottom:.75rem;}
p{color:var(--muted);font-size:.82rem;line-height:1.7;margin-bottom:1.75rem;}
.btn{display:inline-block;background:var(--accent);color:var(--bg);padding:.8rem 2rem;font-family:inherit;font-size:.82rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;box-shadow:var(--glow);transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 35px rgba(0,255,157,.55);}
.ref{margin-top:1.5rem;font-size:.7rem;color:var(--muted);}
.ref span{color:var(--accent);}
hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}
.links{font-size:.72rem;color:var(--muted);}
.links a{color:var(--accent);text-decoration:none;cursor:pointer;}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <p class="tag">Access Restricted</p>
  <h1>Payment Pending</h1>
  <p>Your dashboard is locked until payment is confirmed via Paystack. Complete your registration fee to unlock full access.</p>
  <button class="btn" onclick="openPaystack()">Complete Payment</button>
  <div class="ref">Session: <span id="ref-display">—</span></div>
  <hr/>
  <p class="links">
    Already paid? <a onclick="checkStatus()">Check payment status</a>
    &nbsp;·&nbsp;
    <a href="index.html">Back to home</a>
    &nbsp;·&nbsp;
    <a onclick="GhostAuth.logout()">Logout</a>
  </p>
</div>

<script src="middleware.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  const user = GhostAuth.getSession();
  if (!user) window.location.href = 'login.html';
  if (user && user.payment_status) {
    const routes = { lone:'lone.html', team_4:'team4.html', team_10:'team10.html', admin:'admin.html' };
    window.location.href = routes[user.role] || 'lone.html';
  }

  const PRICES = { lone:150000, team_4:500000, team_10:750000 };
  document.getElementById('ref-display').textContent = user ? user.email : '—';

  function openPaystack() {
    if (!user) return;
    const ref = 'GHOST_' + Date.now();
    const handler = PaystackPop.setup({
      key: 'pk_live_a0122e8eaf5af78c67ee9fa1de121d615e30bb62',
      email: user.email,
      amount: PRICES[user.role] || 150000,
      currency: 'NGN',
      ref,
      metadata: { user_id: user.id, plan: user.role },
      callback: async function(response) {
        localStorage.setItem('ghost_payment_ref', response.reference);
        // Store reference on user record
        await fetch('/api-verify-payment.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reference: response.reference })
        }).catch(() => {});
        alert('Payment submitted! Click "Check payment status" to confirm.');
      },
      onClose: function() {}
    });
    handler.openIframe();
  }

  async function checkStatus() {
    const ref = localStorage.getItem('ghost_payment_ref');
    if (!ref) { alert('No payment reference found. Please complete payment first.'); return; }
    const res  = await fetch(`/api-payment-status?reference=${ref}`);
    const data = await res.json();
    if (data.payment_status) {
      const updated = { ...user, payment_status: true };
      localStorage.setItem('ghost_user', JSON.stringify(updated));
      const routes = { lone:'lone.html', team_4:'team4.html', team_10:'team10.html' };
      window.location.href = routes[user.role] || 'lone.html';
    } else {
      alert('Payment not yet confirmed. Paystack webhook may take a few seconds — try again shortly.');
    }
  }
</script>
</body>
</html>
